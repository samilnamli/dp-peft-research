model:
  name: vit
  pretrained_model: google/vit-base-patch16-224
  num_labels: 10

dataset:
  name: cifar10
  train_split: train
  test_split: test
  image_size: 224

training:
  epochs: 30
  batch_size: 256
  physical_batch_size: 32
  learning_rate: 1e-3

peft:
  method: adapter
  adapter_hidden_dim: 64
