training:
  epochs: 20
  batch_size: 256
  physical_batch_size: 32
  learning_rate: 1e-3
  weight_decay: 0.01
  warmup_steps: 100
  max_grad_norm: 1.0
  early_stopping_patience: 5
  early_stopping_delta: 0.001

privacy:
  target_epsilon: 1.0
  target_delta: 1e-5
  max_grad_norm: 1.0
  noise_multiplier: null

peft:
  method: adapter
  adapter_reduction_factor: 16
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1

logging:
  wandb_project: dp_peft_research
  wandb_entity: null
  log_interval: 10
  save_checkpoints: true
  checkpoint_dir: ./checkpoints

data:
  max_length: 128
  num_workers: 4
  pin_memory: true

system:
  seed: 42
  device: cuda
  mixed_precision: false
